<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDVX · Radar Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #070707; }
    #root { height: 100vh; overflow: hidden; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2c2c2c; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #3c3c3c; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=range] { accent-color: #00d5ca; }
    @keyframes spin  { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { animation: spin 0.9s linear infinite; }
    .pulse   { animation: pulse 1.6s ease-in-out infinite; }
    .fadeUp  { animation: fadeUp 0.18s ease; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback, useEffect, useRef } = React;

// ─── Constants ────────────────────────────────────────────────────────────────

const RADAR_KEYS = ["notes","peak","tsumami","tricky","handtrip","onehand"];
const RADAR_COLORS = {
  notes:"#00d5ca", peak:"#f5003c", tsumami:"#ff00ca",
  tricky:"#f9ff00", handtrip:"#ba66ff", onehand:"#00ff74", total:"#ffffff",
};
const DIFF_COLORS = {
  novice:"#914bc6", advanced:"#a8a307", exhaust:"#943434", maximum:"#707070",
  infinite:"#991551", gravity:"#9e4200", heavenly:"#007fa6",
  vivid:"#c959ad", exceed:"#365191", ultimate:"#e4a300",
};
const DIFF_ABBR = {
  novice:"NOV", advanced:"ADV", exhaust:"EXH", maximum:"MXM",
  infinite:"INF", gravity:"GRV", heavenly:"HVN",
  vivid:"VVD", exceed:"XCD", ultimate:"ULT",
};
// URL path segment for sdvxindex.com/s/(id)/(num)
const DIFF_URL_NUM = {
  novice:"1", advanced:"2", exhaust:"3", maximum:"5",
  infinite:"4i", gravity:"4g", heavenly:"4h",
  vivid:"4v", exceed:"4x", ultimate:"6",
};
const ALL_DIFF_TYPES = Object.keys(DIFF_COLORS);
const ALL_SORT_CATS  = [...RADAR_KEYS, "total", "chain", "exscore"];
const PAGE_SIZE = 100;
// Levels that get a separate XX.0 (exact) filter alongside the XX (full-range) filter
const DECIMAL_LEVEL_RANGE = [17, 18, 19, 20];

// ─── Math ─────────────────────────────────────────────────────────────────────

const mean   = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : 0;
const median = a => { if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2===0?(s[m-1]+s[m])/2:s[m]; };
const stdDev = a => { if(a.length<2) return 0; const mu=mean(a); return Math.sqrt(a.reduce((s,v)=>s+(v-mu)**2,0)/a.length); };
const fmt    = (n,d=1) => Number(n).toFixed(d);

// ─── Domain ───────────────────────────────────────────────────────────────────

function radarTotal(r) { return RADAR_KEYS.reduce((s,k)=>s+(Number(r?.[k])||0),0); }

function levelMatches(level, fv) {
  const l = Number(level);
  if (fv.includes(".")) {
    // exact match e.g. "19.0" only matches charts at exactly 19.0
    return Math.round(l * 10) === Math.round(parseFloat(fv) * 10);
  }
  // range match e.g. "19" matches 19.0–19.9
  return Math.floor(l) === parseInt(fv, 10);
}

// Build level list. For integer levels in DECIMAL_LEVEL_RANGE (17-20) emit both:
//   "20"   → floor match (20.0–20.9)
//   "20.0" → exact match (exactly 20.0), displayed italic
function buildAllLevels(songs) {
  const s = new Set();
  songs.forEach(sg => sg.difficulties?.forEach(d => {
    const lvl = parseFloat(d.level);
    s.add(String(d.level));
    if (DECIMAL_LEVEL_RANGE.includes(Math.floor(lvl)) && lvl === Math.floor(lvl)) {
      s.add(lvl.toFixed(1));          // "19.0"
      s.add(String(Math.floor(lvl))); // "19"
    }
  }));
  return [...s].sort((a, b) => {
    const af = parseFloat(a), bf = parseFloat(b);
    if (Math.abs(bf - af) > 0.001) return bf - af;
    // same numeric value: ".0" (exact) sorts before bare integer (range)
    return a.includes(".") ? -1 : 1;
  });
}

function passesRadarFilter(radar, cats) {
  if (!cats.length) return true;
  if (!radar) return false;
  const vals = cats.map(k=>radar[k]).filter(v=>v!==undefined);
  if (vals.length !== cats.length) return false;
  const sorted = Object.keys(radar).sort((a,b)=>radar[b]-radar[a]);
  const topN   = sorted.slice(0, cats.length);
  const condA  = JSON.stringify([...cats].sort())===JSON.stringify([...topN].sort()) && cats.every(k=>radar[k]>100);
  return condA || vals.every(v=>v>130);
}

function toggle(arr, val) { return arr.includes(val) ? arr.filter(v=>v!==val) : [...arr, val]; }

function getSortVal({diff, total}, cat) {
  if (cat==="total")   return total;
  if (cat==="chain")   return Number(diff.max_chain)||0;
  if (cat==="exscore") return Number(diff.max_exscore)||0;
  return Number(diff.radar?.[cat])||0;
}

function sortColor(cat) {
  if (cat==="chain")   return "#00d5ca";
  if (cat==="exscore") return "#f9ff00";
  return RADAR_COLORS[cat] || "#ffffff";
}

// Standard competition ranking: ties share a rank, next rank skips (1,1,3,3,5…)
function computeRanks(cards, sortCat) {
  if (!cards.length) return [];
  const ranks = new Array(cards.length);
  ranks[0] = 1;
  let rank = 1;
  for (let i = 1; i < cards.length; i++) {
    if (getSortVal(cards[i], sortCat) !== getSortVal(cards[i-1], sortCat)) rank = i + 1;
    ranks[i] = rank;
  }
  return ranks;
}

// ─── Shared Components ────────────────────────────────────────────────────────

function SectionLabel({children}) {
  return <div style={{fontSize:8.5,letterSpacing:3,color:"#4c4c4c",fontWeight:700,
    textTransform:"uppercase",marginBottom:8,paddingBottom:5,borderBottom:"1px solid #1e1e1e"}}>{children}</div>;
}

function Chip({label, active, color="#555", onClick}) {
  return (
    <button onClick={onClick} style={{
      padding:"4px 10px", fontSize:10.5,
      background: active ? color+"1e" : "transparent",
      border:`1px solid ${active ? color+"66" : "#222"}`,
      color: active ? color : "#484848",
      borderRadius:3, cursor:"pointer", fontFamily:"inherit",
      letterSpacing:0.5, textAlign:"left", transition:"all 0.1s",
      whiteSpace:"nowrap", boxShadow: active ? `0 0 8px ${color}18` : "none",
    }}>{label}</button>
  );
}

function LevelGrid({allLevels, levelFilters, setLevelFilters}) {
  return (
    <div>
      <SectionLabel>LEVEL</SectionLabel>
      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
        {allLevels.map(lvl => {
          const isExact = lvl.includes(".");
          const active  = levelFilters.includes(lvl);
          return (
            <button key={lvl} onClick={()=>setLevelFilters(f=>toggle(f,lvl))} style={{
              padding:"3px 5px", fontSize:10,
              background: active ? (isExact ? "#00d5ca18" : "#ffffff12") : "transparent",
              border:`1px solid ${active ? (isExact ? "#00d5ca55" : "#4a4a4a") : "#1e1e1e"}`,
              color: active ? (isExact ? "#00d5ca" : "#ccc") : "#484848",
              borderRadius:3, cursor:"pointer", fontFamily:"inherit",
              fontVariantNumeric:"tabular-nums", transition:"all 0.1s",
              fontStyle: isExact ? "italic" : "normal",
            }}>{lvl}</button>
          );
        })}
      </div>
      <div style={{fontSize:7.5,color:"#333",marginTop:5,lineHeight:1.8}}>
        <span style={{fontStyle:"italic",color:"#3c3c3c"}}>XX.0</span> = exact rating
        &ensp;&middot;&ensp;
        <span>XX</span> = full range
      </div>
    </div>
  );
}

function Sidebar({children}) {
  return <aside style={{width:210,flexShrink:0,background:"#090909",borderRight:"1px solid #181818",
    overflowY:"auto",padding:"14px 10px",display:"flex",flexDirection:"column",gap:16}}>{children}</aside>;
}

function ResetBtn({onClick}) {
  return <button onClick={onClick} style={{padding:"7px",background:"transparent",
    border:"1px solid #242424",color:"#484848",borderRadius:3,cursor:"pointer",
    fontFamily:"inherit",fontSize:9.5,letterSpacing:1.5,transition:"all 0.1s"}}>RESET FILTERS</button>;
}

// ─── Radar Bar ────────────────────────────────────────────────────────────────

function RadarBar({label, value, maxVal, color, highlight, glow}) {
  const pct = maxVal > 0 ? Math.min(100, (value/maxVal)*100) : 0;
  return (
    <div style={{display:"flex",alignItems:"center",gap:7}}>
      <div style={{width:58,fontSize:8.5,fontWeight:highlight?700:400,
        color:highlight?color:"#404040",letterSpacing:1,flexShrink:0,textTransform:"uppercase"}}>{label}</div>
      <div style={{flex:1,height:5,background:"#0d0d0d",borderRadius:3,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,
          background:highlight?color:"#282828",borderRadius:3,
          boxShadow:(highlight&&glow)?`0 0 6px ${color}66`:"none",transition:"width 0.25s ease"}}/>
      </div>
      <div style={{width:34,fontSize:10.5,textAlign:"right",fontWeight:highlight?700:400,
        color:highlight?color:"#3e3e3e",flexShrink:0,fontVariantNumeric:"tabular-nums"}}>{value}</div>
    </div>
  );
}

// ─── Spider Chart ─────────────────────────────────────────────────────────────

function SpiderChart({data, maxVal=300, size=190, compareData=null}) {
  const cx=size/2, cy=size/2, r=size*0.34;
  const step=(2*Math.PI)/RADAR_KEYS.length, start=-Math.PI/2;
  const pt=(i,ratio)=>({x:cx+r*ratio*Math.cos(start+i*step),y:cy+r*ratio*Math.sin(start+i*step)});
  const polyPts=(vals)=>RADAR_KEYS.map((k,i)=>pt(i,Math.min(1,(vals[k]||0)/maxVal)));
  const toPath=(pts)=>pts.map(p=>`${p.x},${p.y}`).join(" ");
  const dataPts=polyPts(data);
  const cmpPts=compareData?polyPts(compareData):null;
  return (
    <svg width={size} height={size} style={{overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map((lvl,li)=>(
        <polygon key={li} points={toPath(RADAR_KEYS.map((_,i)=>pt(i,lvl)))}
          fill="none" stroke={li===3?"#282828":"#191919"} strokeWidth={li===3?1.5:1}/>
      ))}
      {RADAR_KEYS.map((_,i)=>{const p=pt(i,1); return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#191919" strokeWidth="1"/>;})}
      {cmpPts&&<polygon points={toPath(cmpPts)} fill="#ffffff07" stroke="#ffffff2a" strokeWidth="1.5"/>}
      <polygon points={toPath(dataPts)} fill="#00d5ca12" stroke="#00d5ca77" strokeWidth="1.5"/>
      {dataPts.map((p,i)=>(
        <circle key={i} cx={p.x} cy={p.y} r={2.5} fill={RADAR_COLORS[RADAR_KEYS[i]]}
          style={{filter:`drop-shadow(0 0 3px ${RADAR_COLORS[RADAR_KEYS[i]]})`}}/>
      ))}
      {RADAR_KEYS.map((k,i)=>{
        const angle=start+i*step;
        const lx=cx+(r+20)*Math.cos(angle), ly=cy+(r+20)*Math.sin(angle);
        return <text key={k} x={lx} y={ly} textAnchor="middle" dominantBaseline="middle"
          fontSize="8" fill={RADAR_COLORS[k]} fontFamily="JetBrains Mono,monospace" letterSpacing="1" fontWeight="700">
          {k==="handtrip"?"HAND":k==="tsumami"?"TSUM":k.slice(0,4).toUpperCase()}
        </text>;
      })}
    </svg>
  );
}

// ─── Chart Card ───────────────────────────────────────────────────────────────

function ChartCard({song, diff, total, sortCat, maxSingle, rank}) {
  const [hov, setHov] = useState(false);
  const t    = diff.type.toLowerCase();
  const dc   = DIFF_COLORS[t]   || "#555";
  const abbr = DIFF_ABBR[t]     || t.toUpperCase();
  const diffNum = DIFF_URL_NUM[t];
  const sdvxUrl = diffNum ? `https://sdvxindex.com/s/${song.songid}/${diffNum}` : null;

  return (
    <div className="fadeUp"
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        background:"#0d0d0d",
        border:`1px solid ${hov?dc+"33":"#1c1c1c"}`,
        borderTop:`2px solid ${hov?dc:dc+"88"}`,
        borderRadius:6, padding:"10px 12px",
        position:"relative", display:"flex", flexDirection:"column", gap:7,
        transition:"all 0.13s", transform:hov?"translateY(-1px)":"none",
        boxShadow:hov?`0 6px 20px rgba(0,0,0,0.5),0 0 14px ${dc}0e`:"0 2px 8px rgba(0,0,0,0.3)",
      }}>

      {/* rank badge */}
      <span style={{position:"absolute",top:7,right:9,fontSize:8.5,color:"#383838",fontWeight:700,letterSpacing:1}}>#{rank}</span>

      {/* title / artist */}
      <div style={{paddingRight:28}}>
        <div style={{fontSize:12,fontWeight:700,color:hov?"#e8e8e8":"#d2d2d2",lineHeight:1.3,
          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",transition:"color 0.13s"}}>{song.title}</div>
        <div style={{fontSize:9.5,color:"#585858",marginTop:2}}>{song.artist}</div>
      </div>

      {/* diff badge + level + bpm */}
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <span style={{fontSize:9,fontWeight:700,color:dc,background:dc+"18",
          padding:"2px 7px",borderRadius:3,letterSpacing:1.5,border:`1px solid ${dc}2a`}}>{abbr}</span>
        <span style={{fontSize:15,fontWeight:800,color:"#e8e8e8",letterSpacing:-0.5}}>{diff.level}</span>
        <span style={{marginLeft:"auto",fontSize:9.5,color:"#484848",letterSpacing:0.5}}>{song.bpm} BPM</span>
      </div>

      {/* radar bars */}
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        {RADAR_KEYS.map(k=>(
          <RadarBar key={k} label={k} value={Number(diff.radar?.[k])||0}
            maxVal={maxSingle} color={RADAR_COLORS[k]} highlight={sortCat===k} glow={hov}/>
        ))}
        <div style={{marginTop:3,paddingTop:4,borderTop:"1px solid #181818"}}>
          <RadarBar label="total" value={total} maxVal={maxSingle*6}
            color="#ffffff" highlight={sortCat==="total"} glow={hov}/>
        </div>
      </div>

      {/* chain / exscore / index link */}
      <div style={{display:"flex",gap:10,fontSize:9.5,paddingTop:5,borderTop:"1px solid #161616",alignItems:"center"}}>
        <span style={{color:sortCat==="chain"?"#00d5ca":"#4a4a4a",fontWeight:sortCat==="chain"?700:400,letterSpacing:0.5}}>
          ⛓ {(diff.max_chain||0).toLocaleString()}
        </span>
        <span style={{color:sortCat==="exscore"?"#f9ff00":"#4a4a4a",fontWeight:sortCat==="exscore"?700:400,letterSpacing:0.5}}>
          EX {(diff.max_exscore||0).toLocaleString()}
        </span>
        {sdvxUrl && (
          <a href={sdvxUrl} target="_blank" rel="noopener noreferrer"
            onClick={e=>e.stopPropagation()}
            style={{
              marginLeft:"auto", fontSize:8, letterSpacing:1.2, fontWeight:700,
              padding:"2px 7px", borderRadius:2, textDecoration:"none",
              border:`1px solid ${hov?"#00d5ca44":"#242424"}`,
              color: hov ? "#00d5ca" : "#3c3c3c",
              transition:"all 0.12s",
            }}>INDEX ↗</a>
        )}
      </div>
    </div>
  );
}

// ─── Explorer Tab ─────────────────────────────────────────────────────────────

function ExplorerTab({songs, allCards, maxSingle}) {
  const [search,       setSearch]       = useState("");
  const [levelFilters, setLevelFilters] = useState([]);
  const [diffFilters,  setDiffFilters]  = useState([]);
  const [radarFilters, setRadarFilters] = useState([]);
  const [sortCat,      setSortCat]      = useState("total");
  const [sortDir,      setSortDir]      = useState("high-low");
  const [visibleCount, setVisibleCount] = useState(PAGE_SIZE);

  const mainRef     = useRef(null);
  const sentinelRef = useRef(null);

  const allLevels    = useMemo(()=>buildAllLevels(songs),[songs]);
  const presentDiffs = useMemo(()=>{
    const s=new Set(); songs.forEach(sg=>sg.difficulties?.forEach(d=>s.add(d.type.toLowerCase())));
    return ALL_DIFF_TYPES.filter(t=>s.has(t));
  },[songs]);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase().trim();
    let res = allCards.filter(({song,diff})=>{
      if(q && !song.title?.toLowerCase().includes(q) && !song.artist?.toLowerCase().includes(q)) return false;
      if(levelFilters.length && !levelFilters.some(f=>levelMatches(diff.level,f))) return false;
      if(diffFilters.length  && !diffFilters.includes(diff.type.toLowerCase())) return false;
      if(!passesRadarFilter(diff.radar, radarFilters)) return false;
      return true;
    });
    return [...res].sort((a,b)=>
      sortDir==="high-low" ? getSortVal(b,sortCat)-getSortVal(a,sortCat)
                           : getSortVal(a,sortCat)-getSortVal(b,sortCat)
    );
  },[allCards,search,levelFilters,diffFilters,radarFilters,sortCat,sortDir]);

  // Tied ranking: 1,1,3,3,5…
  const ranks = useMemo(()=>computeRanks(filtered, sortCat),[filtered,sortCat]);

  // Reset page + scroll whenever filtered set changes
  useEffect(()=>{
    setVisibleCount(PAGE_SIZE);
    if(mainRef.current) mainRef.current.scrollTop = 0;
  },[filtered]);

  // IntersectionObserver: load next page when sentinel enters viewport
  useEffect(()=>{
    const sentinel = sentinelRef.current;
    if(!sentinel) return;
    const obs = new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting)
        setVisibleCount(c=>Math.min(c+PAGE_SIZE, filtered.length));
    },{threshold:0.1});
    obs.observe(sentinel);
    return ()=>obs.disconnect();
  },[filtered.length]);

  const visible    = filtered.slice(0, visibleCount);
  const hasFilters = levelFilters.length||diffFilters.length||radarFilters.length||search;

  return (
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <Sidebar>
        <div>
          <SectionLabel>SEARCH</SectionLabel>
          <input type="text" placeholder="title / artist…" value={search}
            onChange={e=>setSearch(e.target.value)}
            style={{width:"100%",padding:"6px 8px",background:"#0f0f0f",border:"1px solid #242424",
              borderRadius:3,color:"#bbb",fontFamily:"inherit",fontSize:11,outline:"none"}}/>
        </div>

        <div>
          <SectionLabel>SORT BY</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            {ALL_SORT_CATS.map(cat=>{
              const c=sortColor(cat), active=sortCat===cat;
              return <button key={cat} onClick={()=>setSortCat(cat)} style={{
                padding:"5px 8px",background:active?c+"12":"transparent",
                border:`1px solid ${active?c+"55":"#1e1e1e"}`,
                borderRadius:3,color:active?c:"#3e3e3e",cursor:"pointer",fontFamily:"inherit",
                fontSize:10,textAlign:"left",letterSpacing:1.5,textTransform:"uppercase",
                fontWeight:active?700:400,transition:"all 0.1s",boxShadow:active?`0 0 8px ${c}18`:"none",
              }}>{cat==="chain"?"⛓ CHAIN":cat==="exscore"?"EX SCORE":cat}</button>;
            })}
          </div>
          <div style={{display:"flex",gap:4,marginTop:7}}>
            {[["high-low","↓ HI→LO"],["low-high","↑ LO→HI"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>setSortDir(val)} style={{
                flex:1,padding:"4px 2px",fontSize:8.5,letterSpacing:0.3,
                background:sortDir===val?"#00d5ca0f":"transparent",
                border:`1px solid ${sortDir===val?"#00d5ca44":"#1e1e1e"}`,
                color:sortDir===val?"#00d5ca":"#3e3e3e",
                borderRadius:3,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",
              }}>{lbl}</button>
            ))}
          </div>
        </div>

        <div>
          <SectionLabel>RADAR FILTER</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {RADAR_KEYS.map(k=>(
              <Chip key={k} label={k.toUpperCase()} active={radarFilters.includes(k)}
                color={RADAR_COLORS[k]} onClick={()=>setRadarFilters(f=>toggle(f,k))}/>
            ))}
          </div>
          {radarFilters.length>0&&(
            <div style={{fontSize:8.5,color:"#3c3c3c",marginTop:6,lineHeight:1.7}}>dominant or &gt;130 on<br/>selected axes</div>
          )}
        </div>

        <div>
          <SectionLabel>DIFFICULTY</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {presentDiffs.map(t=>(
              <Chip key={t} label={`${DIFF_ABBR[t]||t.toUpperCase()}  ${t}`}
                active={diffFilters.includes(t)} color={DIFF_COLORS[t]}
                onClick={()=>setDiffFilters(f=>toggle(f,t))}/>
            ))}
          </div>
        </div>

        <LevelGrid allLevels={allLevels} levelFilters={levelFilters} setLevelFilters={setLevelFilters}/>
        {hasFilters&&<ResetBtn onClick={()=>{setLevelFilters([]);setDiffFilters([]);setRadarFilters([]);setSearch("");}}/>}
      </Sidebar>

      <main ref={mainRef} style={{flex:1,overflowY:"auto",padding:10}}>
        {filtered.length===0 ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#2e2e2e",fontSize:12,letterSpacing:4}}>
            NO MATCHING CHARTS
          </div>
        ) : (
          <>
            <div style={{fontSize:8.5,color:"#383838",letterSpacing:2,marginBottom:8,textAlign:"right"}}>
              {visibleCount < filtered.length
                ? `${visibleCount.toLocaleString()} / ${filtered.length.toLocaleString()} CHARTS`
                : `${filtered.length.toLocaleString()} CHARTS`}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:8}}>
              {visible.map(({song,diff,total},i)=>(
                <ChartCard key={`${song.songid}-${diff.type}`}
                  song={song} diff={diff} total={total}
                  sortCat={sortCat} maxSingle={maxSingle} rank={ranks[i]}/>
              ))}
            </div>
            {visibleCount < filtered.length && (
              <div ref={sentinelRef} style={{height:48,display:"flex",alignItems:"center",
                justifyContent:"center",color:"#2c2c2c",fontSize:9,letterSpacing:3,marginTop:8}}>
                LOADING MORE…
              </div>
            )}
          </>
        )}
      </main>
    </div>
  );
}

// ─── Statistics Tab ───────────────────────────────────────────────────────────

function StatsTab({songs, allCards}) {
  const [diffFilters,  setDiffFilters]  = useState([]);
  const [levelFilters, setLevelFilters] = useState([]);

  const allLevels    = useMemo(()=>buildAllLevels(songs),[songs]);
  const presentDiffs = useMemo(()=>{
    const s=new Set(); songs.forEach(sg=>sg.difficulties?.forEach(d=>s.add(d.type.toLowerCase())));
    return ALL_DIFF_TYPES.filter(t=>s.has(t));
  },[songs]);

  const selected = useMemo(()=>allCards.filter(({diff})=>{
    if(diffFilters.length  && !diffFilters.includes(diff.type.toLowerCase())) return false;
    if(levelFilters.length && !levelFilters.some(f=>levelMatches(diff.level,f))) return false;
    return true;
  }),[allCards,diffFilters,levelFilters]);

  const stats = useMemo(()=>{
    if(!selected.length) return null;
    const res={};
    [...RADAR_KEYS,"total"].forEach(k=>{
      const vals=selected.map(({diff,total})=>k==="total"?total:(Number(diff.radar?.[k])||0));
      res[k]={mean:mean(vals),std:stdDev(vals),median:median(vals),min:Math.min(...vals),max:Math.max(...vals)};
    });
    const lvls=selected.map(({diff})=>parseFloat(diff.level));
    res._level={mean:mean(lvls),std:stdDev(lvls),median:median(lvls),min:Math.min(...lvls),max:Math.max(...lvls)};
    const dd={};
    selected.forEach(({diff})=>{const t=diff.type.toLowerCase(); dd[t]=(dd[t]||0)+1;});
    res._diff=dd;
    return res;
  },[selected]);

  const spiderData = useMemo(()=>stats?Object.fromEntries(RADAR_KEYS.map(k=>[k,stats[k]?.mean||0])):{},[stats]);
  const spiderMax  = useMemo(()=>stats?Math.max(...RADAR_KEYS.map(k=>stats[k]?.max||0),100):300,[stats]);

  return (
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <Sidebar>
        <div>
          <SectionLabel>DIFFICULTY</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {presentDiffs.map(t=>(
              <Chip key={t} label={`${DIFF_ABBR[t]||t.toUpperCase()}  ${t}`}
                active={diffFilters.includes(t)} color={DIFF_COLORS[t]}
                onClick={()=>setDiffFilters(f=>toggle(f,t))}/>
            ))}
          </div>
        </div>
        <LevelGrid allLevels={allLevels} levelFilters={levelFilters} setLevelFilters={setLevelFilters}/>
        {(diffFilters.length||levelFilters.length)>0&&(
          <ResetBtn onClick={()=>{setDiffFilters([]);setLevelFilters([]);}}/>
        )}
      </Sidebar>

      <main style={{flex:1,overflowY:"auto",padding:18,display:"flex",flexDirection:"column",gap:18}}>
        {!stats ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#2e2e2e",fontSize:12,letterSpacing:4}}>NO DATA</div>
        ) : (
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:18}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:20,flexWrap:"wrap"}}>
              <div>
                <div style={{fontSize:32,fontWeight:800,color:"#00d5ca",letterSpacing:-1,lineHeight:1,textShadow:"0 0 24px #00d5ca44"}}>
                  {selected.length.toLocaleString()}
                </div>
                <div style={{fontSize:8,color:"#3a3a3a",letterSpacing:3,marginTop:3}}>CHARTS</div>
              </div>
              {[
                {label:"LVL MEAN",   val:fmt(stats._level.mean,2)},
                {label:"LVL MEDIAN", val:fmt(stats._level.median,2)},
                {label:"STD DEV",    val:"±"+fmt(stats._level.std,2)},
                {label:"RANGE",      val:`${fmt(stats._level.min,1)}–${fmt(stats._level.max,1)}`},
              ].map(({label,val})=>(
                <div key={label} style={{borderLeft:"1px solid #1e1e1e",paddingLeft:18}}>
                  <div style={{fontSize:17,fontWeight:700,color:"#cccccc",letterSpacing:-0.3}}>{val}</div>
                  <div style={{fontSize:8,color:"#383838",letterSpacing:2,marginTop:2}}>{label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
              {/* Spider */}
              <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px 12px",
                display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{fontSize:8,color:"#383838",letterSpacing:3}}>AVERAGE SHAPE</div>
                <SpiderChart data={spiderData} maxVal={spiderMax} size={200}/>
                <div style={{fontSize:8,color:"#383838",letterSpacing:1}}>outer ring = {Math.round(spiderMax)}</div>
              </div>

              {/* Radar stats table */}
              <div style={{flex:1,minWidth:300,background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px"}}>
                <div style={{fontSize:8,color:"#383838",letterSpacing:3,marginBottom:14}}>RADAR STATISTICS</div>
                <div style={{display:"grid",gridTemplateColumns:"64px 1fr 82px 64px 72px",gap:"7px 10px",alignItems:"center"}}>
                  {["AXIS","","MEAN ± STD","MEDIAN","RANGE"].map((h,i)=>(
                    <div key={i} style={{fontSize:7.5,color:"#333",letterSpacing:2}}>{h}</div>
                  ))}
                  {[...RADAR_KEYS,"total"].map(k=>{
                    const s=stats[k]; if(!s) return null;
                    const c=RADAR_COLORS[k];
                    const barMax=k==="total"?spiderMax*RADAR_KEYS.length:spiderMax;
                    const pct=Math.min(100,(s.mean/barMax)*100);
                    return (
                      <React.Fragment key={k}>
                        <div style={{fontSize:9,color:c,letterSpacing:1,fontWeight:700,textTransform:"uppercase"}}>{k}</div>
                        <div style={{height:4,background:"#0d0d0d",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:2,boxShadow:`0 0 5px ${c}55`}}/>
                        </div>
                        <div style={{fontSize:9.5,color:"#888",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>
                          {fmt(s.mean,1)} <span style={{color:"#3a3a3a"}}>±{fmt(s.std,1)}</span>
                        </div>
                        <div style={{fontSize:9.5,color:"#585858",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(s.median,1)}</div>
                        <div style={{fontSize:9,color:"#404040",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(s.min,0)}–{fmt(s.max,0)}</div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>

              {/* Diff breakdown */}
              {Object.keys(stats._diff).length>1&&(
                <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px",minWidth:170}}>
                  <div style={{fontSize:8,color:"#383838",letterSpacing:3,marginBottom:14}}>DIFF BREAKDOWN</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {Object.entries(stats._diff).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{
                      const pct=(count/selected.length)*100, c=DIFF_COLORS[type]||"#555";
                      return (
                        <div key={type} style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:30,fontSize:8.5,color:c,fontWeight:700,letterSpacing:1}}>{DIFF_ABBR[type]||type.toUpperCase()}</div>
                          <div style={{flex:1,height:4,background:"#0d0d0d",borderRadius:2,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:2}}/>
                          </div>
                          <div style={{width:36,fontSize:9,color:"#585858",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(pct,1)}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

// ─── Estimator Tab ────────────────────────────────────────────────────────────

function EstimatorTab({allCards, maxSingle}) {
  const [inputs,   setInputs]   = useState(()=>Object.fromEntries(RADAR_KEYS.map(k=>[k,""])));
  const [kCount,   setKCount]   = useState(30);
  const [results,  setResults]  = useState(null);

  const filledKeys = useMemo(()=>RADAR_KEYS.filter(k=>inputs[k].trim()!==""),[inputs]);

  const handleCalc = useCallback(()=>{
    if(!filledKeys.length) return;
    const target = Object.fromEntries(filledKeys.map(k=>[k,parseFloat(inputs[k])||0]));
    const withDist = allCards.map(card=>{
      const sumSq = filledKeys.reduce((s,k)=>{
        const d=(Number(card.diff.radar?.[k])||0)-target[k];
        const n=maxSingle>0?d/maxSingle:d;
        return s+n*n;
      },0);
      return {...card,dist:Math.sqrt(sumSq/filledKeys.length)};
    });
    withDist.sort((a,b)=>a.dist-b.dist);
    const topK=withDist.slice(0,kCount);
    const levels=topK.map(c=>parseFloat(c.diff.level));
    const levelDist={};
    levels.forEach(l=>{const key=String(l);levelDist[key]=(levelDist[key]||0)+1;});
    const diffDist={};
    topK.forEach(c=>{const t=c.diff.type.toLowerCase();diffDist[t]=(diffDist[t]||0)+1;});
    const radarAvg={};
    RADAR_KEYS.forEach(k=>{const vals=topK.map(c=>Number(c.diff.radar?.[k])||0);radarAvg[k]=mean(vals);});
    setResults({topK,
      levelStats:{mean:mean(levels),std:stdDev(levels),median:median(levels),min:Math.min(...levels),max:Math.max(...levels)},
      levelDist,diffDist,radarAvg});
  },[allCards,inputs,filledKeys,kCount,maxSingle]);

  const inputSpider = useMemo(()=>Object.fromEntries(RADAR_KEYS.map(k=>[k,parseFloat(inputs[k])||0])),[inputs]);

  return (
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <aside style={{width:240,flexShrink:0,background:"#090909",borderRight:"1px solid #181818",
        overflowY:"auto",padding:"16px 12px",display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <div style={{fontSize:10.5,color:"#00d5ca",letterSpacing:4,fontWeight:700,marginBottom:6}}>ESTIMATOR</div>
          <div style={{fontSize:8.5,color:"#3e3e3e",letterSpacing:0.5,lineHeight:1.8}}>
            Enter radar values you know.<br/>Leave blank to ignore that<br/>axis in the search.
          </div>
        </div>

        <div>
          <SectionLabel>RADAR INPUT</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {RADAR_KEYS.map(k=>{
              const filled=inputs[k].trim()!=="", c=RADAR_COLORS[k];
              return (
                <div key={k} style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:58,fontSize:8.5,color:filled?c:"#4e4e4e",letterSpacing:1,
                    textTransform:"uppercase",fontWeight:700,flexShrink:0}}>{k}</div>
                  <input type="number" placeholder="—" value={inputs[k]}
                    onChange={e=>setInputs(p=>({...p,[k]:e.target.value}))}
                    style={{flex:1,padding:"5px 7px",
                      background:filled?c+"10":"#0d0d0d",
                      border:`1px solid ${filled?c+"50":"#242424"}`,
                      borderRadius:3,color:filled?c:"#3e3e3e",
                      fontFamily:"inherit",fontSize:12,outline:"none",
                      fontVariantNumeric:"tabular-nums",transition:"all 0.12s"}}/>
                </div>
              );
            })}
          </div>
          {filledKeys.length>0&&(
            <div style={{fontSize:8,color:"#3a3a3a",letterSpacing:1,marginTop:6}}>
              {filledKeys.length} axis{filledKeys.length!==1?"es":""} active
            </div>
          )}
        </div>

        <div>
          <SectionLabel>NEAREST K</SectionLabel>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="range" min={5} max={100} step={5} value={kCount}
              onChange={e=>setKCount(Number(e.target.value))} style={{flex:1}}/>
            <span style={{fontSize:13,color:"#00d5ca",fontWeight:700,width:28,textAlign:"right"}}>{kCount}</span>
          </div>
        </div>

        <button onClick={handleCalc} disabled={filledKeys.length===0} style={{
          padding:"10px",
          background:filledKeys.length>0?"#00d5ca14":"transparent",
          border:`1px solid ${filledKeys.length>0?"#00d5ca44":"#222"}`,
          color:filledKeys.length>0?"#00d5ca":"#2e2e2e",
          borderRadius:4,cursor:filledKeys.length>0?"pointer":"default",
          fontFamily:"inherit",fontSize:11,letterSpacing:2.5,fontWeight:700,
          boxShadow:filledKeys.length>0?"0 0 16px #00d5ca18":"none",transition:"all 0.13s",
        }}>CALCULATE</button>

        {results&&(
          <button onClick={()=>{setInputs(Object.fromEntries(RADAR_KEYS.map(k=>[k,""])));setResults(null);}} style={{
            padding:"6px",background:"transparent",border:"1px solid #202020",color:"#3c3c3c",
            borderRadius:3,cursor:"pointer",fontFamily:"inherit",fontSize:9,letterSpacing:1,
          }}>CLEAR</button>
        )}
      </aside>

      <main style={{flex:1,overflowY:"auto",padding:16}}>
        {!results ? (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            height:"100%",gap:12,color:"#242424"}}>
            <div style={{fontSize:36}}>◈</div>
            <div style={{fontSize:11,letterSpacing:6}}>ENTER VALUES TO ESTIMATE</div>
            <div style={{fontSize:8.5,color:"#2e2e2e",letterSpacing:1.5,textAlign:"center",lineHeight:1.9,marginTop:4}}>
              Fill in radar values you know.<br/>Leave axes blank to search using<br/>only the filled fields.
            </div>
          </div>
        ) : (
          <div className="fadeUp" style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[
                {label:"EST. LEVEL",val:fmt(results.levelStats.median,2),c:"#00d5ca",glow:true},
                {label:"MEAN LEVEL",val:fmt(results.levelStats.mean,2),c:"#aaaaaa"},
                {label:"STD DEV",   val:"±"+fmt(results.levelStats.std,2),c:"#585858"},
                {label:"RANGE",     val:`${fmt(results.levelStats.min,1)}–${fmt(results.levelStats.max,1)}`,c:"#484848"},
              ].map(({label,val,c,glow})=>(
                <div key={label} style={{background:"#0c0c0c",border:`1px solid ${glow?"#00d5ca22":"#1a1a1a"}`,
                  borderRadius:6,padding:"12px 16px",boxShadow:glow?"0 0 20px #00d5ca10":"none"}}>
                  <div style={{fontSize:22,fontWeight:800,color:c,letterSpacing:-0.5,textShadow:glow?"0 0 20px #00d5ca66":"none"}}>{val}</div>
                  <div style={{fontSize:8,color:"#383838",letterSpacing:2,marginTop:3}}>{label}</div>
                </div>
              ))}
            </div>

            <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
              <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px",
                display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{fontSize:8,color:"#383838",letterSpacing:3}}>AVG OF NEAREST K vs INPUT</div>
                <SpiderChart data={results.radarAvg} compareData={inputSpider} maxVal={maxSingle} size={200}/>
                <div style={{display:"flex",gap:14,fontSize:8,color:"#3c3c3c"}}>
                  <span style={{color:"#00d5ca66"}}>— nearest avg</span>
                  <span style={{color:"#ffffff33"}}>— your input</span>
                </div>
              </div>

              <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px",flex:1,minWidth:200}}>
                <div style={{fontSize:8,color:"#383838",letterSpacing:3,marginBottom:14}}>LEVEL DISTRIBUTION</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {Object.entries(results.levelDist).sort((a,b)=>parseFloat(b[0])-parseFloat(a[0])).map(([lvl,count])=>{
                    const pct=(count/results.topK.length)*100, dom=pct>20;
                    return (
                      <div key={lvl} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:36,fontSize:10,color:dom?"#cccccc":"#585858",textAlign:"right",
                          fontVariantNumeric:"tabular-nums",fontWeight:dom?700:400}}>{lvl}</div>
                        <div style={{flex:1,height:6,background:"#0d0d0d",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:dom?"#00d5ca":"#1e1e1e",
                            borderRadius:3,boxShadow:dom?"0 0 8px #00d5ca44":"none"}}/>
                        </div>
                        <div style={{width:26,fontSize:9,color:"#484848",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{count}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px",minWidth:160}}>
                <div style={{fontSize:8,color:"#383838",letterSpacing:3,marginBottom:14}}>DIFFICULTY</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {Object.entries(results.diffDist).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{
                    const pct=(count/results.topK.length)*100, c=DIFF_COLORS[type]||"#555";
                    return (
                      <div key={type} style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:30,fontSize:8.5,color:c,fontWeight:700,letterSpacing:1}}>{DIFF_ABBR[type]||type.toUpperCase()}</div>
                        <div style={{flex:1,height:5,background:"#0d0d0d",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:c,borderRadius:2}}/>
                        </div>
                        <div style={{width:34,fontSize:9,color:"#585858",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmt(pct,1)}%</div>

            </div>

            <div style={{background:"#0b0b0b",border:"1px solid #1a1a1a",borderRadius:8,padding:"16px"}}>
              <div style={{fontSize:8,color:"#383838",letterSpacing:3,marginBottom:12}}>TOP {results.topK.length} NEAREST MATCHES</div>

                <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
                  <thead>
                    <tr>

                          textAlign:"left",paddingBottom:6,borderBottom:"1px solid #181818",paddingRight:10}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {results.topK.map(({song,diff,dist},i)=>{
                      const t=diff.type.toLowerCase(), dc=DIFF_COLORS[t]||"#555";
                      return (
                        <tr key={`${song.songid}-${diff.type}-${i}`} style={{background:i%2===0?"transparent":"#0a0a0a"}}>
                          <td style={{fontSize:8.5,color:"#333",padding:"5px 10px 5px 0"}}>{i+1}</td>
                          <td style={{fontSize:11,color:"#aaa",padding:"5px 10px 5px 0",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{song.title}</td>
                          <td style={{fontSize:9,color:"#484848",padding:"5px 10px 5px 0",maxWidth:90,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{song.artist}</td>
                          <td style={{fontSize:8.5,color:dc,fontWeight:700,letterSpacing:1,padding:"5px 10px 5px 0"}}>{DIFF_ABBR[t]||t.toUpperCase()}</td>
                          <td style={{fontSize:12,fontWeight:700,color:"#ccc",padding:"5px 10px 5px 0"}}>{diff.level}</td>
                          {RADAR_KEYS.map(k=>(
                            <td key={k} style={{fontSize:9,color:"#484848",fontVariantNumeric:"tabular-nums",padding:"5px 10px 5px 0"}}>
                              {Number(diff.radar?.[k])||0}
                            </td>
                          ))}
                          <td style={{fontSize:9,color:"#333",fontVariantNumeric:"tabular-nums",padding:"5px 0"}}>{fmt(dist*100,2)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [songs,    setSongs]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [error,    setError]    = useState(null);
  const [activeTab,setActiveTab]= useState("explorer");

  useEffect(()=>{
    fetch("./songsv1.3.3.json")
      .then(r=>{ if(!r.ok) throw new Error(`HTTP ${r.status} – songsv1.3.3.json not found`); return r.json(); })
      .then(data=>{ setSongs(Array.isArray(data)?data:[]); setLoading(false); })
      .catch(err=>{ setError(err.message); setLoading(false); });
  },[]);

  const allCards  = useMemo(()=>songs.flatMap(song=>(song.difficulties||[]).map(diff=>({song,diff,total:radarTotal(diff.radar)}))),[songs]);
  const maxSingle = useMemo(()=>{let m=1; allCards.forEach(({diff})=>RADAR_KEYS.forEach(k=>{if((diff.radar?.[k]||0)>m)m=diff.radar[k];})); return m;},[allCards]);

  const TABS=[{id:"explorer",label:"EXPLORER"},{id:"stats",label:"STATISTICS"},{id:"estimator",label:"ESTIMATOR"}];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#080808",
      color:"#ccc",fontFamily:"'JetBrains Mono','Courier New',monospace",overflow:"hidden"}}>

      <header style={{display:"flex",alignItems:"stretch",height:46,background:"#090909",
        borderBottom:"1px solid #181818",flexShrink:0}}>
        <div style={{padding:"0 18px",display:"flex",alignItems:"center",borderRight:"1px solid #181818",flexShrink:0}}>
          <span style={{fontWeight:800,fontSize:13,letterSpacing:6,color:"#00d5ca",textShadow:"0 0 22px #00d5ca55"}}>SDVX</span>
          <span style={{fontWeight:300,fontSize:13,letterSpacing:5,color:"#3e3e3e",marginLeft:1}}>·RADAR</span>
        </div>
        <div style={{display:"flex",height:"100%",marginLeft:2}}>
          {TABS.map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{
              padding:"0 18px",height:"100%",background:"transparent",border:"none",
              borderBottom:`2px solid ${activeTab===tab.id?"#00d5ca":"transparent"}`,
              color:activeTab===tab.id?"#00d5ca":"#3e3e3e",
              cursor:"pointer",fontFamily:"inherit",fontSize:9.5,letterSpacing:3,fontWeight:700,
              transition:"all 0.12s",textShadow:activeTab===tab.id?"0 0 12px #00d5ca55":"none",
            }}>{tab.label}</button>
          ))}
        </div>
        {!loading&&!error&&(
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",padding:"0 18px",gap:8}}>
            <span style={{fontSize:8.5,color:"#333",letterSpacing:2}}>{songs.length.toLocaleString()} SONGS</span>
            <div style={{width:1,height:12,background:"#222"}}/>
            <span style={{fontSize:8.5,color:"#333",letterSpacing:2}}>{allCards.length.toLocaleString()} CHARTS</span>
          </div>
        )}
      </header>

      {loading ? (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
          <div className="spinner" style={{width:28,height:28,border:"2px solid #1e1e1e",borderTopColor:"#00d5ca",borderRadius:"50%"}}/>
          <div className="pulse" style={{fontSize:9.5,color:"#3a3a3a",letterSpacing:5}}>LOADING SONGSV1.3.3.JSON</div>
        </div>
      ) : error ? (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
          <div style={{fontSize:28,color:"#2e2e2e"}}>◈</div>
          <div style={{fontSize:11,color:"#f5003c",letterSpacing:3}}>LOAD ERROR</div>
          <div style={{fontSize:9,color:"#4a4a4a",letterSpacing:1,maxWidth:360,textAlign:"center",lineHeight:1.9}}>{error}</div>
          <div style={{fontSize:8.5,color:"#333",letterSpacing:1,marginTop:4}}>Ensure songsv1.3.3.json is in the same directory as index.html.</div>
        </div>
      ) : (
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          {activeTab==="explorer"  && <ExplorerTab  songs={songs} allCards={allCards} maxSingle={maxSingle}/>}
          {activeTab==="stats"     && <StatsTab     songs={songs} allCards={allCards}/>}
          {activeTab==="estimator" && <EstimatorTab allCards={allCards} maxSingle={maxSingle}/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
